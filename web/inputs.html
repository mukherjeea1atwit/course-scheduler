<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Inputs — WIT Class Scheduler</title>
  <style>
    :root {
      --wit-gold: #FFCB05;
      --wit-red:  #99181B;
      --gray-50:  #f9fafb;
      --gray-100: #e5e7eb;
      --gray-200: #d1d5db;
      --gray-800: #1f2937;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; background: var(--gray-50); color: var(--gray-800); }

    /* ── Page header ── */
    .page-head { padding: 16px 20px 0; }
    .page-head h1 { font-size: 18px; font-weight: 700; }
    .page-head p  { color: #6b7280; font-size: 12px; margin-top: 3px; }

    /* ── Tab bar ── */
    .tabs { display: flex; gap: 0; padding: 12px 20px 0; background: #fff; border-bottom: 2px solid var(--gray-100); overflow-x: auto; }
    .tab  { padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: #6b7280; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .15s, border-color .15s; }
    .tab:hover { color: var(--gray-800); }
    .tab.active { color: var(--wit-red); border-bottom-color: var(--wit-red); font-weight: 600; }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 20px; background: #fff; border-bottom: 1px solid var(--gray-100); }
    .btn { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--gray-200); background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn:hover { background: var(--gray-50); }
    .btn-save { background: var(--wit-red); color: #fff; border-color: var(--wit-red); }
    .btn-save:hover { background: #7f1316; }
    .upload-label { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--gray-200); background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; }
    .upload-label:hover { background: var(--gray-50); }
    .upload-label input { display: none; }
    .status-msg { font-size: 12px; color: #6b7280; margin-left: auto; }
    .status-msg.saved  { color: #15803d; }
    .status-msg.error  { color: #dc2626; }

    /* ── Table ── */
    .table-wrap { overflow: auto; padding: 16px 20px; max-height: calc(100vh - 180px); }
    table  { border-collapse: collapse; width: 100%; }
    th     { background: var(--gray-50); border: 1px solid var(--gray-200); padding: 6px 10px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
    td     { border: 1px solid var(--gray-200); padding: 0; }
    td input { width: 100%; min-width: 80px; padding: 5px 8px; border: none; outline: none; font-size: 13px; font-family: inherit; background: transparent; }
    td input:focus { background: #fffbeb; box-shadow: inset 0 0 0 2px var(--wit-gold); border-radius: 0; }
    tr:nth-child(even) td { background: #fafafa; }
    tr:hover td, tr:hover td input { background: #f0f9ff; }
    .del-cell { width: 32px; text-align: center; border: 1px solid var(--gray-200); }
    .del-btn { padding: 2px 6px; border: none; background: none; cursor: pointer; color: #9ca3af; font-size: 14px; line-height: 1; }
    .del-btn:hover { color: #dc2626; }
    .empty-msg { color: #9ca3af; text-align: center; padding: 40px; }
  </style>
</head>
<body>

<div class="page-head">
  <h1>Input Editor</h1>
  <p>Edit scheduling input files. Changes are saved directly to the data CSV files used by the scheduler.</p>
</div>

<div class="tabs" id="tabBar"></div>

<div class="toolbar">
  <button class="btn" onclick="addRow()">+ Add Row</button>
  <button class="btn btn-save" onclick="saveData()">💾 Save</button>
  <label class="upload-label">
    📂 Upload CSV / Excel <input type="file" accept=".csv,.xlsx,.xls,text/csv" onchange="uploadCSV(this)">
  </label>
  <button class="btn" id="dlTemplateBtn" onclick="downloadTemplate()" style="display:none">⬇ Download Template</button>
  <span class="status-msg" id="statusMsg"></span>
</div>

<div class="table-wrap" id="tableWrap">
  <p class="empty-msg">Loading…</p>
</div>

<script>
const FILES = [
  { slug: 'courses',            label: 'Course List'         },
  { slug: 'preferences',        label: 'Faculty Preferences' },
  { slug: 'faculty_load',       label: 'Faculty Load'        },
  { slug: 'timings',            label: 'Time Slots'          },
  { slug: 'rooms',              label: 'Rooms'               },
  { slug: 'room_preferences',   label: 'Room Preferences'   },
  { slug: 'non_overlap_groups', label: 'Non-Overlap Groups' },
];

let activeSlug   = FILES[0].slug;
let tableData    = [];   // array of plain objects
let tableHeaders = [];   // column key order
let dirty        = false;

/* ── Build tab bar ─────────────────────────────────────────────────────── */
const tabBar = document.getElementById('tabBar');
FILES.forEach(({ slug, label }) => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (slug === activeSlug ? ' active' : '');
  btn.textContent = label;
  btn.dataset.slug = slug;
  btn.onclick = () => switchTab(slug);
  tabBar.appendChild(btn);
});

/* ── Tab switching ─────────────────────────────────────────────────────── */
async function switchTab(slug) {
  if (dirty && !confirm('You have unsaved changes. Discard them?')) return;
  activeSlug = slug;
  dirty = false;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.slug === slug));
  setStatus('');
  await loadData();
}

/* ── Load ──────────────────────────────────────────────────────────────── */
async function loadData() {
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<p class="empty-msg">Loading…</p>';
  try {
    const res = await fetch(`/api/data/${activeSlug}`);
    if (!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    tableData = rows;

    if (rows.length > 0) {
      tableHeaders = Object.keys(rows[0]);
    } else {
      // File is empty — fetch headers so we can show the template table
      const hRes = await fetch(`/api/data/${activeSlug}/headers`);
      tableHeaders = hRes.ok ? await hRes.json() : [];
    }

    renderTable();
  } catch (e) {
    wrap.innerHTML = `<p class="empty-msg" style="color:#dc2626">Error: ${e.message}</p>`;
  }
}

/* ── Render ────────────────────────────────────────────────────────────── */
function renderTable() {
  const wrap = document.getElementById('tableWrap');
  const dlBtn = document.getElementById('dlTemplateBtn');

  if (!tableHeaders.length) {
    wrap.innerHTML = '<p class="empty-msg">No data found.</p>';
    dlBtn.style.display = 'none';
    return;
  }

  // Show template download button whenever we have headers
  dlBtn.style.display = '';

  // Show a hint row when the table is empty
  if (tableData.length === 0) {
    wrap.innerHTML = '';
    const tbl = document.createElement('table');
    const thead = tbl.createTHead();
    const hr = thead.insertRow();
    tableHeaders.forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      hr.appendChild(th);
    });
    const thDel = document.createElement('th');
    thDel.className = 'del-cell';
    hr.appendChild(thDel);
    const tbody = tbl.createTBody();
    const hint = tbody.insertRow();
    const td = hint.insertCell();
    td.colSpan = tableHeaders.length + 1;
    td.style.cssText = 'text-align:center;padding:18px;color:#9ca3af;font-style:italic;background:#fafafa';
    td.textContent = 'No rows yet — click "+ Add Row" or upload a file to get started.';
    wrap.appendChild(tbl);
    return;
  }
  const tbl = document.createElement('table');

  // Header row
  const thead = tbl.createTHead();
  const hr = thead.insertRow();
  tableHeaders.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    hr.appendChild(th);
  });
  const thDel = document.createElement('th');
  thDel.className = 'del-cell';
  hr.appendChild(thDel);

  // Data rows
  const tbody = tbl.createTBody();
  tableData.forEach((row, ri) => tbody.appendChild(makeRow(row, ri)));

  wrap.innerHTML = '';
  wrap.appendChild(tbl);
}

function makeRow(row, ri) {
  const tr = document.createElement('tr');
  tr.dataset.ri = ri;
  tableHeaders.forEach(h => {
    const td = tr.insertCell();
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = row[h] || '';
    inp.setAttribute('data-key', h);
    inp.addEventListener('input', () => {
      tableData[ri][h] = inp.value;
      dirty = true;
      setStatus('Unsaved changes');
    });
    td.appendChild(inp);
  });
  const delTd = tr.insertCell();
  delTd.className = 'del-cell';
  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.title = 'Delete row';
  delBtn.textContent = '✕';
  delBtn.onclick = () => deleteRow(ri);
  delTd.appendChild(delBtn);
  return tr;
}

/* ── Add / delete ──────────────────────────────────────────────────────── */
function addRow() {
  const empty = Object.fromEntries(tableHeaders.map(h => [h, '']));
  tableData.push(empty);
  dirty = true;
  const ri = tableData.length - 1;
  const tbody = document.querySelector('table tbody');
  if (tbody) tbody.appendChild(makeRow(empty, ri));
  // Scroll to new row
  const wrap = document.getElementById('tableWrap');
  wrap.scrollTop = wrap.scrollHeight;
  setStatus('Unsaved changes');
}

function deleteRow(ri) {
  tableData.splice(ri, 1);
  dirty = true;
  renderTable();
  setStatus('Unsaved changes');
}

/* ── Save ──────────────────────────────────────────────────────────────── */
async function saveData() {
  setStatus('Saving…');
  try {
    const res = await fetch(`/api/data/${activeSlug}`, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(tableData),
    });
    if (!res.ok) throw new Error(await res.text());
    dirty = false;
    setStatus('✓ Saved', 'saved');
    setTimeout(() => setStatus(''), 3000);
  } catch (e) {
    setStatus(`Save failed: ${e.message}`, 'error');
  }
}

/* ── Upload CSV ────────────────────────────────────────────────────────── */
async function uploadCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  setStatus('Uploading…');
  try {
    const res = await fetch(`/api/data/${activeSlug}/upload`, { method: 'POST', body: fd });
    if (!res.ok) throw new Error(await res.text());
    const j = await res.json();
    dirty = false;
    setStatus(`✓ Uploaded (${j.rows} rows)`, 'saved');
    await loadData();
    setTimeout(() => setStatus(''), 4000);
  } catch (e) {
    setStatus(`Upload failed: ${e.message}`, 'error');
  }
  input.value = '';
}

/* ── Download template ─────────────────────────────────────────────────── */
function downloadTemplate() {
  if (!tableHeaders.length) return;
  const csvContent = tableHeaders.join(',') + '\n';
  const blob = new Blob([csvContent], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${activeSlug}_template.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

/* ── Status helper ─────────────────────────────────────────────────────── */
function setStatus(msg, cls = '') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (cls ? ' ' + cls : '');
}

/* ── Init ──────────────────────────────────────────────────────────────── */
loadData();
</script>

<script src="/web/nav.js"></script>
</body>
</html>
